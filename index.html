<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>%E2%9A%BD</text></svg>" />

    <title>Agora na Copa 26 — Copa do Mundo FIFA 2026 ao vivo</title>
    <meta
      name="description"
      content="Acompanhe a Copa do Mundo FIFA 2026 ao vivo: contagem regressiva, onde assistir (Globo, SporTV, CazéTV, FIFA+), escalações, tabela dos grupos, classificação e chaveamento — tudo num só lugar."
    />
    <link rel="canonical" href="https://copa2026.mpbarbosa.com/" />
    <!-- Language alternates: pt-BR (default), es-LATAM (es.) and en-US (en.)
         subdomains. Every page lists all three + x-default, per hreflang reciprocity. -->
    <link rel="alternate" hreflang="pt-BR" href="https://copa2026.mpbarbosa.com/" />
    <link rel="alternate" hreflang="es" href="https://es.copa2026.mpbarbosa.com/" />
    <link rel="alternate" hreflang="en" href="https://en.copa2026.mpbarbosa.com/" />
    <link rel="alternate" hreflang="x-default" href="https://copa2026.mpbarbosa.com/" />
    <meta name="theme-color" content="#0a0a0a" />

    <!-- Resource hints: warm the connections the first paint + data depend on
         (Google Fonts, FIFA image CDN + API) so LCP starts sooner. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://digitalhub.fifa.com" />
    <link rel="dns-prefetch" href="https://api.fifa.com" />

    <!-- Google AdSense site-ownership verification (Metatag method). Static tag only:
         loads no script and sets no cookies, so it is LGPD-safe — the actual
         adsbygoogle.js is still injected by AdSlot only after consent === "all".
         Publisher id must match ADSENSE_PUBLISHER_ID in src/config.ts. -->
    <meta name="google-adsense-account" content="ca-pub-9509229216258895" />

    <!-- Open Graph (WhatsApp, Facebook, LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Agora na Copa 26" />
    <meta property="og:locale" content="pt_BR" />
    <meta property="og:url" content="https://copa2026.mpbarbosa.com/" />
    <meta property="og:title" content="Agora na Copa 26 — Copa do Mundo FIFA 2026 ao vivo" />
    <meta
      property="og:description"
      content="Contagem regressiva, onde assistir, escalações, tabela dos grupos e chaveamento da Copa do Mundo FIFA 2026 — tudo num só lugar."
    />
    <meta property="og:image" content="https://copa2026.mpbarbosa.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Agora na Copa 26 — companheiro da Copa do Mundo FIFA 2026" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Agora na Copa 26 — Copa do Mundo FIFA 2026 ao vivo" />
    <meta
      name="twitter:description"
      content="Contagem regressiva, onde assistir, escalações, tabela dos grupos e chaveamento da Copa do Mundo FIFA 2026 — tudo num só lugar."
    />
    <meta name="twitter:image" content="https://copa2026.mpbarbosa.com/og-image.png" />

    <!-- Structured data (schema.org). WebSite + Organization identify the site;
         SportsEvent describes the tournament this companion covers. Locale pages
         swap inLanguage + names via localizeIndexHtml (server-i18n.ts). -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "WebSite",
          "@id": "https://copa2026.mpbarbosa.com/#website",
          "url": "https://copa2026.mpbarbosa.com/",
          "name": "Agora na Copa 26",
          "inLanguage": "pt-BR",
          "publisher": { "@id": "https://copa2026.mpbarbosa.com/#org" }
        },
        {
          "@type": "Organization",
          "@id": "https://copa2026.mpbarbosa.com/#org",
          "name": "Agora na Copa 26",
          "url": "https://copa2026.mpbarbosa.com/",
          "logo": "https://copa2026.mpbarbosa.com/og-image.png"
        },
        {
          "@type": "SportsEvent",
          "name": "Copa do Mundo FIFA 2026",
          "sport": "Football",
          "startDate": "2026-06-11",
          "endDate": "2026-07-19",
          "eventStatus": "https://schema.org/EventScheduled",
          "eventAttendanceMode": "https://schema.org/OfflineEventAttendanceMode",
          "location": [
            { "@type": "Country", "name": "United States" },
            { "@type": "Country", "name": "Canada" },
            { "@type": "Country", "name": "Mexico" }
          ],
          "organizer": { "@type": "Organization", "name": "FIFA", "url": "https://www.fifa.com/" },
          "url": "https://copa2026.mpbarbosa.com/"
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
